name: Build Android APK

on:
  push:
    branches: [master, feature/*]
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js static export
        run: npm run build

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Create signing keystore
        run: |
          # Use a consistent keystore for all builds so updates work
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/what2play.keystore || {
            # Fallback: generate new keystore if secret not set
            keytool -genkeypair \
              -alias what2play \
              -keyalg RSA \
              -keysize 2048 \
              -validity 10000 \
              -keystore android/what2play.keystore \
              -storepass what2play2026 \
              -keypass what2play2026 \
              -dname "CN=What2Play, OU=Dev, O=Uppel, L=Wallenhorst, ST=NDS, C=DE"
          }

      - name: Build release APK
        working-directory: android
        env:
          KEYSTORE_PWD: ${{ secrets.KEYSTORE_PASSWORD }}
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=$PWD/what2play.keystore \
            -Pandroid.injected.signing.store.password=${KEYSTORE_PWD:-what2play2026} \
            -Pandroid.injected.signing.key.alias=what2play \
            -Pandroid.injected.signing.key.password=${KEYSTORE_PWD:-what2play2026}

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: what2play-release
          path: android/app/build/outputs/apk/release/app-release.apk

      - name: Get short SHA
        id: sha
        run: echo "short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Create GitHub Release with APK
        if: github.ref == 'refs/heads/master'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ steps.sha.outputs.short }}
          name: What2Play Build ${{ steps.sha.outputs.short }}
          body: |
            Automatischer Build vom Commit ${{ github.sha }}

            Lade die APK direkt herunter — kein Entpacken nötig.
          files: android/app/build/outputs/apk/release/app-release.apk
          make_latest: true

      - name: Create Pre-Release for feature branches
        if: startsWith(github.ref, 'refs/heads/feature/')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}-${{ steps.sha.outputs.short }}
          name: "🧪 ${{ github.ref_name }} (${{ steps.sha.outputs.short }})"
          body: |
            **Feature Branch Build**

            Branch: `${{ github.ref_name }}`
            Commit: ${{ github.sha }}

            ⚠️ Dies ist ein Testbuild — nicht für Produktion!
          files: android/app/build/outputs/apk/release/app-release.apk
          prerelease: true

      - name: Output keystore for first-time setup
        if: env.HAS_KEYSTORE != 'true'
        env:
          HAS_KEYSTORE: ${{ secrets.KEYSTORE_BASE64 != '' }}
        run: |
          echo "⚠️ No KEYSTORE_BASE64 secret found. A new keystore was generated."
          echo "To enable consistent signing for updates, add this as a GitHub secret:"
          echo ""
          echo "Secret name: KEYSTORE_BASE64"
          echo "Secret value:"
          base64 -w0 android/what2play.keystore
          echo ""
          echo ""
          echo "Also add: KEYSTORE_PASSWORD = what2play2026"
