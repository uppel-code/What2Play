name: Build Android APK

on:
  push:
    branches: [master, feature/*]
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js static export
        run: npm run build

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build debug APK
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: what2play-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk

      - name: Get short SHA
        id: sha
        run: echo "short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Create GitHub Release with APK
        if: github.ref == 'refs/heads/master'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ steps.sha.outputs.short }}
          name: What2Play Build ${{ steps.sha.outputs.short }}
          body: |
            Automatischer Build vom Commit ${{ github.sha }}

            Lade die APK direkt herunter — kein Entpacken nötig.
          files: android/app/build/outputs/apk/debug/app-debug.apk
          make_latest: true

      - name: Create Pre-Release for feature branches
        if: startsWith(github.ref, 'refs/heads/feature/')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}-${{ steps.sha.outputs.short }}
          name: "🧪 ${{ github.ref_name }} (${{ steps.sha.outputs.short }})"
          body: |
            **Feature Branch Build**

            Branch: `${{ github.ref_name }}`
            Commit: ${{ github.sha }}

            ⚠️ Dies ist ein Testbuild — nicht für Produktion!
          files: android/app/build/outputs/apk/debug/app-debug.apk
          prerelease: true
